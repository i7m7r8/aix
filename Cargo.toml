[package]
name = "aix"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib", "staticlib", "lib"]

[dependencies]
tokio = { version = "1", features = ["rt-multi-thread"] }
anyhow = "1.0"
once_cell = "1.19"
serde = { version = "1.0", features = ["derive"] }
chrono = { version = "0.4", features = ["serde"] }
arti-client = { version = "0.40", default-features = false, features = ["tokio", "rustls"] }
tor-rtcompat = { version = "0.40", default-features = false, features = ["tokio", "rustls"] }
jni = "0.21"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
android_logger = "0.13"
log = "0.4"

# Override rusqlite to use bundled sqlite3 for Android
rusqlite = { version = "0.38", features = ["bundled"] }
