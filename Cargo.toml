[package]
name = "aix"
version = "3.0.0"
edition = "2021"

[lib]
crate-type = ["cdylib"]

[dependencies]
# Async runtime
tokio = { version = "1", features = ["full"] }
anyhow = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "2.0"
async-trait = "0.1"
futures = "0.3"
chrono = "0.4"
uuid = { version = "1.0", features = ["v4", "serde"] }
once_cell = "1.0"
tracing = "0.1"
tracing-subscriber = "0.3"
lazy_static = "1.4"

# HTTP client (rustls, no OpenSSL)
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls", "stream"] }

# Telegram bot (rustls)
teloxide = { version = "0.12", default-features = false, features = ["macros", "webhooks", "rustls"] }

# LLM / AI – Markov chain (pure Rust)
rand = "0.8"

# Tools
walkdir = "2"
zip = "2.2"
tempfile = "3"
sysinfo = "0.33"
notify = "7.0"

# Syntax highlighting
syntect = "5.2"

# UI
eframe = { version = "0.30", features = ["android-game-activity", "glow"] }
egui = "0.30"
egui_extras = { version = "0.30", features = ["image"] }
egui_plot = "0.30"

# Android specifics
android-activity = { version = "0.6", features = ["game-activity"] }
android_logger = "0.13"

# Concurrency
crossbeam = "0.8"
parking_lot = "0.12"

# Persistence
directories = "5.0"

[target.'cfg(target_os = "android")'.dependencies]
android-activity = { version = "0.6", features = ["game-activity"] }

[package.metadata.android]
package = "com.i7m7r8.aix"
label = "AIX Ultra"
assets = "assets"
build_targets = ["aarch64-linux-android"]
min_sdk_version = 23
target_sdk_version = 34

[[package.metadata.android.permission]]
name = "android.permission.INTERNET"
[[package.metadata.android.permission]]
name = "android.permission.READ_EXTERNAL_STORAGE"
[[package.metadata.android.permission]]
name = "android.permission.WRITE_EXTERNAL_STORAGE"
[[package.metadata.android.permission]]
name = "android.permission.MANAGE_EXTERNAL_STORAGE"
[[package.metadata.android.permission]]
name = "android.permission.ACCESS_NOTIFICATION_POLICY"
[[package.metadata.android.permission]]
name = "android.permission.SYSTEM_ALERT_WINDOW"
