[package]
name = "aix"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib", "staticlib", "lib"]

[dependencies]
# Core
tokio = { version = "1", features = ["rt-multi-thread", "net", "io-util", "time", "macros"] }
anyhow = "1.0"
once_cell = "1.19"
serde = { version = "1.0", features = ["derive"] }
chrono = { version = "0.4", features = ["serde"] }

# Tor client with transports
arti-client = { version = "0.40", features = [
    "tokio",
    "bridge-client",
    "pt-client",
    "webtunnel",
    "obfs4",
    "socks",
    "native-tls",
] }

# Android UI
dioxus = { version = "0.6", features = ["mobile"] }
dioxus-mobile = "0.6"

# JNI
jni = "0.21"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
android_logger = "0.13"
log = "0.4"

# VPN & TUN (packet forwarding will use these)
tun = "0.5"
smoltcp = "0.10"
