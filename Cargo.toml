[package]
name = "aix"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib", "staticlib", "lib"]

[[bin]]
name = "aix"
path = "src/main.rs"

[dependencies]
# Core
tokio = { version = "1", features = ["rt-multi-thread", "net", "io-util", "time", "macros"] }
anyhow = "1.0"
once_cell = "1.19"
serde = { version = "1.0", features = ["derive"] }
chrono = { version = "0.4", features = ["serde"] }

# Tor client – disable default features and use rustls
arti-client = { version = "0.40", default-features = false, features = [
    "tokio",
    "bridge-client",
    "pt-client",
    "rustls",
] }

# JNI
jni = "0.21"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
android_logger = "0.13"
log = "0.4"

# Slint UI (Android backend)
slint = { version = "1.15.1", features = ["backend-android-activity-05"] }
slint-build = "1.15.1"

[build-dependencies]
slint-build = "1.15.1"
