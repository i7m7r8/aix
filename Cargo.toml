[package]
name = "aix"
version = "1.0.0"
edition = "2021"

[lib]
crate-type = ["cdylib"]

[dependencies]
eframe = { version = "0.30", features = ["android-game-activity", "glow"] }
egui = "0.30"
egui_extras = { version = "0.30", features = ["image"] }
candle-core = { version = "0.8.1", features = ["cpu"] }
candle-transformers = "0.8.1"
candle-nn = "0.8.1"
tokenizers = { version = "0.21", default-features = false }
tokio = { version = "1", features = ["full"] }
anyhow = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
chrono = "0.4"
log = "0.4"
android_logger = "0.13"
zip = "0.6"
half = { version = "2.4", features = ["rand_distr"] }
rand = "0.8"

[target.'cfg(target_os = "android")'.dependencies]
android-activity = { version = "0.6", features = ["game-activity"] }

[package.metadata.android]
package = "com.i7m7r8.aix"
label = "AIX Ultra Agent"
assets = "assets"
build_targets = ["aarch64-linux-android"]
min_sdk_version = 23
target_sdk_version = 34

[[package.metadata.android.permission]]
name = "android.permission.INTERNET"
[[package.metadata.android.permission]]
name = "android.permission.READ_EXTERNAL_STORAGE"
[[package.metadata.android.permission]]
name = "android.permission.WRITE_EXTERNAL_STORAGE"
[[package.metadata.android.permission]]
name = "android.permission.MANAGE_EXTERNAL_STORAGE"
