[package]
name = "aix"
version = "1.0.0"
edition = "2021"

[lib]
crate-type = ["cdylib"]

[dependencies]
eframe = { version = "0.30", features = ["android-game-activity", "glow"] }
egui = "0.30"
serde = { version = "1.0", features = ["derive"] }
anyhow = "1.0"
log = "0.4"
android_logger = "0.13"
chrono = "0.4"
directories = "5.0"
zip = "2.2"
walkdir = "2"
tempfile = "3"
syntect = "5.2"
tokio = { version = "1", features = ["full"] }

[target.'cfg(target_os = "android")'.dependencies]
android-activity = { version = "0.6", features = ["game-activity"] }

[package.metadata.android]
package = "com.i7m7r8.aix"
label = "AIX Ultra"
assets = "assets"
build_targets = ["aarch64-linux-android"]
min_sdk_version = 23
target_sdk_version = 34

[[package.metadata.android.permission]]
name = "android.permission.INTERNET"
[[package.metadata.android.permission]]
name = "android.permission.READ_EXTERNAL_STORAGE"
[[package.metadata.android.permission]]
name = "android.permission.WRITE_EXTERNAL_STORAGE"
[[package.metadata.android.permission]]
name = "android.permission.MANAGE_EXTERNAL_STORAGE"

# Debug signing (so APK can be built without a custom keystore)

# Use debug signing for CI

[package.metadata.android.signing]
debug = {}
