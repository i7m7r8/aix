[package]
name = "aix"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib", "staticlib", "lib"]

[[bin]]
name = "aix"
path = "src/main.rs"

[dependencies]
# Core
tokio = { version = "1.45", features = ["rt-multi-thread", "net", "io-util", "time", "macros"] }
anyhow = "1.0.102"
once_cell = "1.21.4"
serde = { version = "1.0.228", features = ["derive"] }
chrono = { version = "0.4.44", features = ["serde"] }

# Tor client – rustls avoids OpenSSL
arti-client = { version = "0.40.0", default-features = false, features = [
    "tokio",
    "rustls",
] }

# JNI
jni = "0.21.1"

# Logging
tracing = "0.1.44"
tracing-subscriber = { version = "0.3.23", features = ["env-filter"] }
android_logger = "0.15.0"
log = "0.4.29"

# egui + Android glue – let eframe handle android-activity
eframe = { version = "0.27.2", features = ["wgpu", "android-native-activity"] }
egui = "0.27.2"
