[package]
name = "aix"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib", "staticlib", "lib"]

[[bin]]
name = "aix"
path = "src/main.rs"

[dependencies]
# Core
tokio = { version = "1", features = ["rt-multi-thread", "net", "io-util", "time", "macros"] }
anyhow = "1.0"
once_cell = "1.19"
serde = { version = "1.0", features = ["derive"] }
chrono = { version = "0.4", features = ["serde"] }

# Tor client – rustls avoids OpenSSL
arti-client = { version = "0.40", default-features = false, features = [
    "tokio",
    "rustls",
] }

# JNI
jni = "0.21"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
android_logger = "0.13"
log = "0.4"

# Iced 0.14 – with wgpu for Android (includes winit and android-activity)
iced = { version = "0.14", features = ["tokio", "wgpu"] }

# Explicitly add android-activity with the required feature to ensure it's enabled
android-activity = { version = "=0.5.0", features = ["native-activity"] }

[patch.crates-io]
# Force all crates to use the exact same version of android-activity
android-activity = { version = "=0.5.0" }
