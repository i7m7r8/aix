name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: aarch64-linux-android
          override: true

      - name: Setup Android SDK
        run: |
          export ANDROID_HOME=/usr/local/lib/android/sdk
          export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH
          yes | sdkmanager --licenses
          sdkmanager "ndk;25.2.9519653" "build-tools;30.0.3" "platforms;android-30"

      - name: Install cargo-apk
        run: cargo install cargo-apk

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > release-key.jks
          ls -la release-key.jks

      - name: Add signing config to Cargo.toml
        run: |
          sed -i '/^\[package\.metadata\.android\.signing\]/,/^$/d' Cargo.toml
          cat >> Cargo.toml << SIGNING

          [package.metadata.android.signing.release]
          path = "release-key.jks"
          keystore_password = "${{ secrets.KEYSTORE_PASSWORD }}"
          key_alias = "${{ secrets.KEY_ALIAS }}"
          key_password = "${{ secrets.KEYSTORE_PASSWORD }}"
          SIGNING

      - name: Build APK
        run: cargo apk build --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: aix-ultra-apk
          path: target/release/apk/aix.apk

      - name: Create or update latest release
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          body: "Automatically generated APK from the latest commit.\n\nCommit: ${{ github.sha }}\nDate: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          files: target/release/apk/aix.apk
          prerelease: true
          overwrite: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
