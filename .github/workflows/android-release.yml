name: Android Release Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Install cargo-apk
        run: cargo install cargo-apk

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK (with NDK and platform 30)
        uses: android-actions/setup-android@v3
        with:
          ndk: true
          ndk-version: '26.1.10909125'
          packages: >-
            tools
            platform-tools
            platforms;android-30
            build-tools;30.0.3
          accept-android-sdk-licenses: true

      - name: Decode Keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > keystore.jks

      - name: Build Unsigned APK
        run: cargo apk build --release --target aarch64-linux-android

      - name: Sign APK
        run: |
          BUILD_TOOLS=$(ls $ANDROID_HOME/build-tools | sort -V | tail -n1)
          APKSIGNER="$ANDROID_HOME/build-tools/$BUILD_TOOLS/apksigner"
          UNSIGNED_APK="target/release/apk/aix.apk"
          SIGNED_APK="signed-aix.apk"
          $APKSIGNER sign --ks keystore.jks \
            --ks-pass pass:${{ secrets.KEYSTORE_PASSWORD }} \
            --ks-key-alias ${{ secrets.KEY_ALIAS }} \
            --out "$SIGNED_APK" "$UNSIGNED_APK"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: aix-signed-apk
          path: signed-aix.apk
          retention-days: 30
