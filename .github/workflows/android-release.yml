name: Android Release Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        target:
          - aarch64-linux-android
          - armv7-linux-androideabi
          - x86_64-linux-android

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Install cargo-apk
        run: cargo install cargo-apk --locked

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          ndk: true
          ndk-version: '27.3.13750724'
          packages: >-
            tools
            platform-tools
            platforms;android-34
            build-tools;34.0.0
          accept-android-sdk-licenses: true

      - name: Set NDK environment variable
        run: echo "ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/27.3.13750724" >> $GITHUB_ENV

      - name: Decode Keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > keystore.jks

      - name: Build APK
        run: cargo apk build --release --target ${{ matrix.target }}
        env:
          ANDROID_NDK_ROOT: ${{ env.ANDROID_NDK_ROOT }}

      - name: Rename & sign APK
        run: |
          mkdir -p out
          cp target/release/apk/aix.apk out/aix-${{ matrix.target }}.apk
          BUILD_TOOLS=$(ls $ANDROID_HOME/build-tools | sort -V | tail -n1)
          $ANDROID_HOME/build-tools/$BUILD_TOOLS/apksigner sign \
            --ks keystore.jks \
            --ks-pass pass:${{ secrets.KEYSTORE_PASSWORD }} \
            --ks-key-alias ${{ secrets.KEY_ALIAS }} \
            --key-pass pass:${{ secrets.KEY_PASSWORD }} \
            --out out/aix-${{ matrix.target }}-signed.apk \
            out/aix-${{ matrix.target }}.apk

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ matrix.target }}
          path: out/aix-${{ matrix.target }}-signed.apk

  release:
    needs: build-android
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all APKs
        uses: actions/download-artifact@v4
        with:
          path: apks
          merge-multiple: true

      - name: Build universal APK (zip of all ABIs)
        run: |
          cd apks
          zip aix-universal.zip *.apk

      - name: Get version info
        id: info
        run: |
          echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ steps.info.outputs.short }}
          name: "AIX ${{ steps.info.outputs.date }} (${{ steps.info.outputs.short }})"
          body: |
            ## AIX VPN Auto-Release
            Commit: `${{ github.sha }}`

            | File | ABI |
            |------|-----|
            | aix-aarch64-linux-android-signed.apk | ARM64 (armv8a) |
            | aix-armv7-linux-androideabi-signed.apk | ARMv7 |
            | aix-x86_64-linux-android-signed.apk | x86_64 |
            | aix-universal.zip | All ABIs |
          files: |
            apks/*.apk
            apks/aix-universal.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
