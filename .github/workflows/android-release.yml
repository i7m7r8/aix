name: Android Release Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android armv7-linux-androideabi x86_64-linux-android

      - name: Install tools
        run: |
          cargo install cargo-ndk --locked
          cargo install dioxus-cli --version 0.7.3 --locked

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode Keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > keystore.jks

      - name: Build Release APKs
        run: |
          dx build --platform android --release --target aarch64-linux-android
          dx build --platform android --release --target armv7-linux-androideabi
          dx build --platform android --release --target x86_64-linux-android
          dx build --platform android --release --universal

      - name: Sign APKs
        run: |
          for apk in target/dx/aix/release/android/**/*.apk; do
            if [ -f "$apk" ]; then
              echo "Signing $(basename $apk)"
              apksigner sign --ks keystore.jks \
                --ks-pass pass:${{ secrets.KEYSTORE_PASSWORD }} \
                --ks-key-alias ${{ secrets.KEYSTORE_ALIAS }} \
                --out "signed-$(basename $apk)" "$apk"
            fi
          done

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aix-signed-apks
          path: signed-*.apk
          retention-days: 30
