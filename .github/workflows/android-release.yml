name: Android Release Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # manual trigger

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android armv7-linux-androideabi x86_64-linux-android

      - name: Install cargo-ndk & dioxus-cli
        run: |
          cargo install cargo-ndk dioxus-cli --locked

      - name: Setup Java + Android SDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > keystore.jks
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: Build Release APKs with Dioxus
        run: |
          # Build for each architecture + universal
          dx build --platform android --release --target aarch64-linux-android
          dx build --platform android --release --target armv7-linux-androideabi
          dx build --platform android --release --target x86_64-linux-android
          
          # Universal (fat) APK - combines all
          dx build --platform android --release --universal

      - name: Sign APKs
        run: |
          # Sign all generated APKs using your keystore
          for apk in target/dx/aix/release/android/**/*.apk; do
            if [ -f "$apk" ]; then
              echo "Signing $(basename $apk)"
              apksigner sign --ks keystore.jks \
                --ks-pass pass:${{ secrets.KEYSTORE_PASSWORD }} \
                --ks-key-alias ${{ secrets.KEYSTORE_ALIAS }} \
                --out "signed-$(basename $apk)" "$apk"
            fi
          done
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEYSTORE_ALIAS: ${{ secrets.KEYSTORE_ALIAS }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aix-apks
          path: |
            signed-*.apk
            target/dx/aix/release/**/*.apk
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        with:
          files: |
            signed-*.apk
          tag_name: latest
          name: AIX VPN Latest Release
          draft: false
          prerelease: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
