name: Release APK

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: aarch64-linux-android
          override: true

      - name: Setup Android SDK
        run: |
          export ANDROID_HOME=/usr/local/lib/android/sdk
          export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH
          yes | sdkmanager --licenses
          sdkmanager "ndk;25.2.9519653" "build-tools;30.0.3" "platforms;android-30"

      - name: Install cargo-apk
        run: cargo install cargo-apk

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > release-key.jks
          ls -la release-key.jks

      - name: Add signing config to Cargo.toml
        run: |
          sed -i '/^\[package\.metadata\.android\.signing\]/,/^$/d' Cargo.toml
          cat >> Cargo.toml << SIGNING

          [package.metadata.android.signing.release]
          path = "release-key.jks"
          keystore_password = "${{ secrets.KEYSTORE_PASSWORD }}"
          key_alias = "${{ secrets.KEY_ALIAS }}"
          key_password = "${{ secrets.KEYSTORE_PASSWORD }}"
          SIGNING

      - name: Build APK
        run: cargo apk build --release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: target/release/apk/aix.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
